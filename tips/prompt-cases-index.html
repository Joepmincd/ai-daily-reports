<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI提示词案例 - 使用技巧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .glass-effect { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-gray-800">
    <a href="./" class="fixed top-4 left-4 z-50 px-4 py-2 bg-white/90 rounded-full text-gray-700 hover:bg-white transition shadow-lg">← 返回使用技巧</a>

    <header class="text-white py-12">
        <div class="container mx-auto px-4 text-center">
            <div class="text-6xl mb-4">🎯</div>
            <h1 class="text-4xl font-bold mb-4">AI提示词案例</h1>
            <p class="text-white/80 text-lg">从X(Twitter)和极客平台收集的优质提示词</p>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-12 max-w-4xl">
        <!-- 说明卡片 -->
        <div class="glass-effect rounded-2xl p-6 mb-8">
            <h2 class="text-xl font-bold mb-3">📋 关于本栏目</h2>
            <p class="text-gray-600 mb-2">每日从以下平台收集AI大V分享的提示词案例：</p>
            <ul class="list-disc list-inside text-gray-600 space-y-1">
                <li>X(Twitter) - AI领域知名博主</li>
                <li>极客平台 - 技术社区优质内容</li>
                <li>其他技术社区</li>
            </ul>
            <p class="text-gray-500 text-sm mt-4">每个案例包含：提示词原文、来源链接、使用场景说明</p>
        </div>

        <!-- 日期列表 -->
        <div class="glass-effect rounded-2xl p-6">
            <h2 class="text-xl font-bold mb-4">📅 历史案例</h2>
            <div class="space-y-3">
                <!-- 今日案例 -->
                <a href="prompt-cases-$(date +%Y-%m-%d).html" class="block p-4 bg-purple-50 rounded-xl hover:bg-purple-100 transition">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-purple-600 font-bold">今日更新</span>
                            <span class="text-gray-600 ml-2">$(date +%Y年%m月%d日)</span>
                        </div>
                        <span class="text-purple-500">查看 →</span>
                    </div>
                </a>

                <a href="prompt-cases-2026-02-27.html" class="block p-4 bg-purple-50 rounded-xl hover:bg-purple-100 transition mb-3">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-purple-600 font-bold">今日更新</span>
                            <span class="text-gray-600 ml-2">2026年02月27日</span>
                        </div>
                        <span class="text-purple-500">查看 →</span>
                    </div>
                </a>
                <!-- 占位：更多日期 -->
                <div class="p-4 bg-gray-50 rounded-xl text-gray-400 text-center">
                    更多历史案例将陆续添加...
                </div>
            </div>
        </div>
    </main>
</body>
</html>
