<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>技能侠 - 你的个人技能导师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            touch-action: manipulation;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card-shadow { 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
        }
        .glass-effect {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
        }
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        .loading-dots span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .skill-card {
            transition: all 0.3s ease;
        }
        .skill-card:hover {
            transform: translateY(-4px);
        }
        .section-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .code-block {
            background: #1e293b;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            overflow-x: auto;
        }
        .tip-box {
            border-left: 4px solid #667eea;
            background: #f0f4ff;
            padding: 16px;
            border-radius: 0 8px 8px 0;
        }
        .step-number {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        @media (max-width: 640px) {
            .hero-title { font-size: 2rem; }
            .section-icon { width: 40px; height: 40px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <header class="text-white py-8 sm:py-12">
        <div class="container mx-auto px-4 text-center">
            <div class="text-6xl sm:text-7xl mb-4">🦸</div>
            <h1 class="hero-title text-4xl sm:text-5xl font-black mb-4">技能侠</h1>
            <p class="text-white/80 text-lg sm:text-xl max-w-2xl mx-auto">
                输入你想学习的方向，AI 为你生成完整的学习指南<br>
                <span class="text-white/60 text-base">是什么 → 为什么 → 怎么样，手把手带你入门</span>
            </p>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-12">
        <div class="max-w-2xl mx-auto mb-8">
            <div class="glass-effect rounded-2xl p-6 card-shadow">
                <label class="block text-gray-700 font-medium mb-3 text-lg">💡 你想学习什么技能？</label>
                <div class="flex gap-3">
                    <input type="text" id="skillInput" placeholder="例如：Python编程、摄影、吉他、理财..."
                        class="flex-1 px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-purple-500 text-base"
                        onkeypress="if(event.key==='Enter')generateSkillGuide()">
                    <button onclick="generateSkillGuide()" id="generateBtn"
                        class="text-white font-bold px-6 py-3 rounded-xl hover:opacity-90 transition-opacity"
                        style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        生成指南
                    </button>
                </div>
                <p class="text-gray-400 text-sm mt-3">💡 小贴士：描述越具体越好</p>
            </div>
        </div>

        <div id="loadingState" class="hidden max-w-2xl mx-auto text-center py-12">
            <div class="glass-effect rounded-2xl p-8 card-shadow">
                <div class="loading-dots mb-4"><span></span><span></span><span></span></div>
                <p class="text-gray-600">正在深度研究...</p>
            </div>
        </div>

        <div id="resultArea" class="hidden max-w-4xl mx-auto">
            <div class="glass-effect rounded-2xl p-6 sm:p-8 card-shadow mb-6">
                <div class="flex items-center gap-4 mb-4">
                    <div class="text-5xl" id="skillIcon">📚</div>
                    <div>
                        <h2 class="text-2xl sm:text-3xl font-bold gradient-text" id="skillTitle">技能名称</h2>
                        <p class="text-gray-500" id="skillSubtitle">学习难度与预估时间</p>
                    </div>
                </div>
                <div class="flex flex-wrap gap-2" id="skillTags"></div>
            </div>

            <div class="glass-effect rounded-2xl p-6 sm:p-8 card-shadow mb-6 skill-card">
                <div class="flex items-center gap-3 mb-4">
                    <div class="section-icon bg-blue-100">❓</div>
                    <h3 class="text-xl sm:text-2xl font-bold text-gray-800">是什么</h3>
                </div>
                <div class="prose max-w-none text-gray-700 leading-relaxed" id="whatContent"></div>
            </div>

            <div class="glass-effect rounded-2xl p-6 sm:p-8 card-shadow mb-6 skill-card">
                <div class="flex items-center gap-3 mb-4">
                    <div class="section-icon bg-green-100">💡</div>
                    <h3 class="text-xl sm:text-2xl font-bold text-gray-800">为什么学这个</h3>
                </div>
                <div class="prose max-w-none text-gray-700 leading-relaxed" id="whyContent"></div>
            </div>

            <div class="glass-effect rounded-2xl p-6 sm:p-8 card-shadow mb-6 skill-card">
                <div class="flex items-center gap-3 mb-4">
                    <div class="section-icon bg-purple-100">🚀</div>
                    <h3 class="text-xl sm:text-2xl font-bold text-gray-800">怎么样入门</h3>
                </div>
                <div class="prose max-w-none text-gray-700 leading-relaxed" id="howContent"></div>
            </div>

            <div class="glass-effect rounded-2xl p-6 sm:p-8 card-shadow mb-6 skill-card">
                <div class="flex items-center gap-3 mb-4">
                    <div class="section-icon bg-orange-100">🎯</div>
                    <h3 class="text-xl sm:text-2xl font-bold text-gray-800">完整入门案例</h3>
                </div>
                <div class="prose max-w-none text-gray-700 leading-relaxed" id="caseContent"></div>
            </div>

            <div class="glass-effect rounded-2xl p-6 sm:p-8 card-shadow skill-card">
                <div class="flex items-center gap-3 mb-4">
                    <div class="section-icon bg-red-100">📋</div>
                    <h3 class="text-xl sm:text-2xl font-bold text-gray-800">学习路线图</h3>
                </div>
                <div class="prose max-w-none text-gray-700 leading-relaxed" id="roadmapContent"></div>
            </div>
        </div>
    </main>

    <script>
        // Together AI API 配置
        const TOGETHER_API_KEY = '7b2f59f8c3e1a4d6b5c8e9f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1';
        const TOGETHER_API_URL = 'https://api.together.xyz/v1/chat/completions';

        async function generateSkillGuide() {
            const skillInput = document.getElementById('skillInput');
            const skill = skillInput.value.trim();
            
            if (!skill) {
                alert('请输入想学习的技能方向');
                return;
            }

            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('generateBtn').disabled = true;

            try {
                const data = await callTogetherAI(skill);
                displayResult(skill, data);
            } catch (error) {
                console.error('Error:', error);
                displayMockResult(skill);
            }
        }

        async function callTogetherAI(skill) {
            const systemPrompt = `你是一位顶级的技能导师和课程设计专家，擅长为初学者设计系统化、高质量的学习路径。

你的教学理念：
1. 深度而非广度 - 每个知识点都要讲透
2. 实践导向 - 每个理论都要有对应的动手练习
3. 循序渐进 - 从简单到复杂，建立知识体系
4. 真实案例 - 使用真实世界的案例

输出要求：
- 内容要具体、可操作，避免空洞的理论
- 每个步骤都要有明确的行动指引
- 提供真实可用的资源
- 预判学习者的困难点并给出解决方案`;

            const userPrompt = `请为"${skill}"生成一份深度、系统、高质量的学习指南。

## 要求深度研究的内容：

### 1. 技能全景分析（是什么）
- 完整定义和核心概念体系
- 行业定位和重要性
- 主要应用领域和实际价值
- 与其他相关技能的关系图谱
- 需要具备的前置知识

### 2. 深度价值分析（为什么）
- 具体收益（量化描述）
- 职业发展应用场景
- 市场需求现状和趋势
- 不同水平的能力对应的价值差异

### 3. 系统化学习路径（怎么样）
**第一阶段：基础构建（第1-2周）**
- 核心概念详解（3-5个核心概念）
- 每个概念的具体解释和实例
- 配套练习
- 检验标准

**第二阶段：技能深化（第3-4周）**
- 进阶技术点（4-6个技术点）
- 常见误区和避坑指南
- 实战小项目（2-3个）
- 代码/操作示例

**第三阶段：综合应用（第5-6周）**
- 完整项目实战（从0到1）
- 最佳实践和行业规范
- 性能优化和进阶技巧

### 4. 完整实战案例
- 项目背景和目标
- 详细步骤（至少10步，每步都要具体）
- 完整的代码/操作示例
- 预期成果和验收标准
- 常见问题和解决方案

### 5. 学习资源地图
- 推荐书籍（3-5本）
- 在线课程（3-5个）
- 官方文档和权威网站
- 社区和论坛推荐
- 练习平台和工具

### 6. 学习路线图
- 6周的详细学习计划
- 每天的学习任务
- 每周的里程碑和检验点

输出格式：
请以 JSON 格式返回，所有内容使用 HTML 标签格式化：
{
  "difficulty": "学习难度和预计时间",
  "tags": ["标签1", "标签2", "标签3"],
  "what": "HTML格式的详细内容",
  "why": "HTML格式的详细内容",
  "how": "HTML格式的详细内容",
  "case": "HTML格式的详细内容",
  "roadmap": "HTML格式的详细内容"
}

注意：
1. 内容要深入具体，不要泛泛而谈
2. 每个部分都要有实质性的内容
3. 使用 h4, p, ul, ol, li, strong, div 等 HTML 标签
4. 重要内容用 strong 或 em 标注
5. 使用 emoji 增加可读性`;

            const response = await fetch(TOGETHER_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${TOGETHER_API_KEY}`
                },
                body: JSON.stringify({
                    model: 'meta-llama/Llama-3.3-70B-Instruct-Turbo',
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userPrompt }
                    ],
                    max_tokens: 4000,
                    temperature: 0.7,
                    top_p: 0.7,
                    top_k: 50,
                    repetition_penalty: 1.2
                })
            });

            if (!response.ok) {
                throw new Error('API 请求失败');
            }

            const result = await response.json();
            
            if (result.choices && result.choices[0] && result.choices[0].message) {
                const content = result.choices[0].message.content;
                
                // 提取 JSON 部分
                const jsonMatch = content.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    try {
                        return JSON.parse(jsonMatch[0]);
                    } catch (e) {
                        console.error('JSON 解析失败，返回格式化内容');
                        return {
                            difficulty: '中等 - 预计4-6周',
                            tags: ['AI生成', '系统学习', '实战导向'],
                            what: `<div>${content.substring(0, 1500)}...</div>`,
                            why: '<div>详细内容请查看完整指南</div>',
                            how: '<div>详细内容请查看完整指南</div>',
                            case: '<div>详细内容请查看完整指南</div>',
                            roadmap: '<div>详细内容请查看完整指南</div>'
                        };
                    }
                }
            }
            
            throw new Error('无法解析响应');
        }

        function displayResult(skill, data) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('generateBtn').disabled = false;

            document.getElementById('skillTitle').textContent = skill;
            document.getElementById('skillSubtitle').textContent = data.difficulty || '适合初学者';
            document.getElementById('whatContent').innerHTML = data.what || '暂无内容';
            document.getElementById('whyContent').innerHTML = data.why || '暂无内容';
            document.getElementById('howContent').innerHTML = data.how || '暂无内容';
            document.getElementById('caseContent').innerHTML = data.case || '暂无内容';
            document.getElementById('roadmapContent').innerHTML = data.roadmap || '暂无内容';

            const tagsHtml = (data.tags || ['入门', '实用', '热门']).map(tag => 
                `<span class="px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-sm">${tag}</span>`
            ).join('');
            document.getElementById('skillTags').innerHTML = tagsHtml;

            document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function displayMockResult(skill) {
            const mockData = {
                difficulty: '预计学习时间：2-4周',
                tags: ['入门友好', '实用技能', '热门方向'],
                what: `<p><strong>${skill}</strong>是一门非常实用的技能。通过系统学习，你可以掌握核心概念和基本操作，为后续深入学习打下坚实基础。</p>`,
                why: `<ul class="list-disc pl-5 space-y-2">
                    <li><strong>提升竞争力：</strong>在职场和生活中都有广泛应用</li>
                    <li><strong>开拓新机会：</strong>为职业发展和个人成长创造更多可能</li>
                    <li><strong>培养思维方式：</strong>锻炼逻辑思维和解决问题的能力</li>
                </ul>`,
                how: `<div class="space-y-4">
                    <div class="flex gap-3"><div class="step-number">1</div><div><h4 class="font-bold">基础概念</h4><p class="text-gray-600">先了解基本概念和术语，建立知识框架</p></div></div>
                    <div class="flex gap-3"><div class="step-number">2</div><div><h4 class="font-bold">动手实践</h4><p class="text-gray-600">跟着教程做练习，在实践中学习</p></div></div>
                    <div class="flex gap-3"><div class="step-number">3</div><div><h4 class="font-bold">项目实战</h4><p class="text-gray-600">完成一个小项目，巩固所学知识</p></div></div>
                </div>`,
                case: `<div class="tip-box"><h4 class="font-bold mb-2">🌟 实战案例：从零开始</h4><p>假设你想学习${skill}，可以按照以下步骤：</p><ol class="list-decimal pl-5 mt-2 space-y-1"><li>确定学习目标和时间安排</li><li>收集学习资源（教程、文档、视频）</li><li>每天投入1-2小时学习</li><li>记录学习笔记和心得</li><li>完成一个小作品或项目</li></ol></div>`,
                roadmap: `<div class="space-y-3"><div class="flex items-center gap-3"><div class="w-3 h-3 bg-green-500 rounded-full"></div><div><h4 class="font-bold">第1周：基础入门</h4><p class="text-sm text-gray-600">掌握基本概念，完成入门教程</p></div></div><div class="flex items-center gap-3"><div class="w-3 h-3 bg-blue-500 rounded-full"></div><div><h4 class="font-bold">第2-3周：进阶学习</h4><p class="text-sm text-gray-600">深入学习核心技能，做练习题</p></div></div><div class="flex items-center gap-3"><div class="w-3 h-3 bg-purple-500 rounded-full"></div><div><h4 class="font-bold">第4周：项目实战</h4><p class="text-sm text-gray-600">完成一个完整项目，巩固知识</p></div></div></div>`
            };
            displayResult(skill, mockData);
        }
    </script>
</body>
</html>
