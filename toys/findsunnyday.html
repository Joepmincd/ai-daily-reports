<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>找晴天 - 发现附近的晴天城市</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans SC', sans-serif; touch-action: manipulation; }
        .gradient-bg { background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%); }
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .city-tag { display: inline-block; padding: 4px 10px; background: #FFF5E6; color: #FF8E53; border-radius: 16px; font-size: 11px; margin: 2px; font-weight: 500; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #FF8E53; border-radius: 50%; animation: spin 1s linear infinite; }
        .loading-lg { width: 40px; height: 40px; border-width: 3px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 20px 20px 0 0; width: 100%; max-height: 85vh; overflow-y: auto; padding: 20px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .city-card { cursor: pointer; transition: all 0.2s; }
        .city-card:active { transform: scale(0.98); background-color: #FFF5E6; }
        .food-item, .spot-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
        .food-item:last-child, .spot-item:last-child { border-bottom: none; }
        
        /* AI生成动画 */
        .ai-generating {
            background: linear-gradient(90deg, #FF6B6B, #FF8E53, #FF6B6B);
            background-size: 200% 100%;
            animation: gradientMove 2s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* 攻略内容淡入动画 */
        .guide-content {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.5s ease forwards;
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 移动端优化 */
        @media (max-width: 640px) {
            .header-title { font-size: 1.75rem; }
            .header-subtitle { font-size: 0.875rem; }
            .search-panel { position: static; margin-bottom: 16px; }
            .city-card { padding: 14px; }
            .modal-content { padding: 16px; border-radius: 16px 16px 0 0; }
            .section-title { font-size: 1rem; }
        }
        
        /* 滑动条样式 */
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; background: #e5e7eb; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #FF8E53; cursor: pointer; }
        input[type="range"]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: #FF8E53; cursor: pointer; border: none; }
        
        /* 日期选择器样式 */
        input[type="date"] { -webkit-appearance: none; }
        
        /* 缓存标记 */
        .cache-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: #10B981;
            background: #ECFDF5;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="gradient-bg text-white py-6 sm:py-8">
        <div class="container mx-auto px-4 text-center">
            <div class="text-5xl sm:text-6xl mb-2 sm:mb-4">☀️</div>
            <h1 class="header-title text-3xl sm:text-4xl font-bold mb-2">找晴天</h1>
            <p class="header-subtitle text-white/80 text-sm sm:text-base">发现你附近的晴天城市，规划完美出行</p>
        </div>
    </header>

    <main class="container mx-auto px-3 sm:px-4 py-4 sm:py-8">
        <div class="flex flex-col lg:flex-row gap-4 sm:gap-8">
            <!-- 搜索面板 -->
            <div class="lg:w-1/3">
                <div class="search-panel bg-white rounded-2xl p-4 sm:p-6 card-shadow lg:sticky lg:top-4">
                    <h2 class="text-lg sm:text-xl font-bold mb-4 sm:mb-6 flex items-center gap-2">
                        <span>🔍</span> 搜索设置
                    </h2>
                    
                    <div class="mb-4 sm:mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">出发城市</label>
                        <input type="text" id="cityInput" placeholder="输入城市名称，如：北京"
                            class="w-full px-4 py-3 text-base border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400"
                            value="北京">
                        <p class="text-xs text-gray-400 mt-1">支持全国 300+ 城市</p>
                    </div>
                    
                    <div class="mb-4 sm:mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">出行日期</label>
                        <input type="date" id="dateInput"
                            class="w-full px-4 py-3 text-base border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400">
                    </div>
                    
                    <div class="mb-4 sm:mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">搜索范围</label>
                        <input type="range" id="radiusInput" min="50" max="500" value="200"
                            oninput="document.getElementById('radiusValue').textContent = this.value + ' km'">
                        <div class="flex justify-between text-xs sm:text-sm text-gray-500 mt-2">
                            <span>50km</span>
                            <span id="radiusValue" class="font-medium text-orange-500">200 km</span>
                            <span>500km</span>
                        </div>
                    </div>
                    
                    <button onclick="searchSunnyCities()" id="searchBtn"
                        class="w-full gradient-bg text-white font-bold py-3.5 sm:py-4 rounded-xl hover:opacity-90 transition-opacity flex items-center justify-center gap-2 text-base">
                        <span id="btnText">开始寻找晴天</span>
                    </button>
                </div>
            </div>
            
            <!-- 结果区域 -->
            <div class="lg:w-2/3">
                <div id="initialState" class="text-center py-12 sm:py-20">
                    <div class="text-6xl sm:text-8xl mb-4 opacity-30">🌤️</div>
                    <h3 class="text-lg sm:text-xl font-medium text-gray-400">输入城市开始搜索</h3>
                </div>
                
                <div id="loadingState" class="hidden text-center py-12 sm:py-20">
                    <div class="loading mb-4"></div>
                    <p class="text-gray-500 text-sm sm:text-base">正在搜索附近的晴天城市...</p>
                </div>
                
                <div id="noResults" class="hidden text-center py-12 sm:py-20">
                    <div class="text-6xl sm:text-8xl mb-4">🌧️</div>
                    <h3 class="text-lg sm:text-xl font-medium text-gray-600">附近没有找到晴天城市</h3>
                    <p class="text-gray-400 mt-2 text-sm">试试扩大搜索范围或换个日期</p>
                </div>
                
                <div id="results" class="hidden">
                    <div class="bg-gradient-to-r from-orange-400 to-red-400 rounded-2xl p-4 sm:p-6 text-white mb-4 sm:mb-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-white/80 text-xs sm:text-sm">找到晴天城市</p>
                                <p class="text-2xl sm:text-3xl font-bold" id="resultCount">0</p>
                            </div>
                            <div class="text-right">
                                <p class="text-white/80 text-xs sm:text-sm">搜索范围</p>
                                <p class="text-lg sm:text-xl font-bold" id="searchRange">200km</p>
                            </div>
                        </div>
                        <p class="text-white/80 text-xs sm:text-sm mt-2">💡 点击城市卡片查看AI生成的详细攻略</p>
                    </div>
                    
                    <div id="cityList"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- 详情弹窗 -->
    <div id="detailModal" class="modal" onclick="closeModalOnBackdrop(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-4 sticky top-0 bg-white pb-2 border-b z-10">
                <div class="flex-1">
                    <h2 id="modalCityName" class="text-xl sm:text-2xl font-bold"></h2>
                    <p id="modalWeather" class="text-gray-500 text-sm mt-1"></p>
                </div>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl p-2 -mr-2 -mt-2">×</button>
            </div>
            
            <!-- AI生成中状态 -->
            <div id="aiLoadingState" class="hidden text-center py-12">
                <div class="loading loading-lg mb-4"></div>
                <p class="ai-generating text-lg font-medium">正在使用AI生成攻略...</p>
                <p class="text-gray-400 text-sm mt-2">Kimi大模型正在为您规划最佳行程</p>
            </div>
            
            <!-- 攻略内容 -->
            <div id="guideContent">
                <div id="singleCityContent" class="hidden">
                    <div class="bg-orange-50 rounded-xl p-3 mb-4">
                        <p class="text-orange-600 text-sm">🎉 只有一个晴天城市，已为你展示详细攻略！</p>
                    </div>
                </div>
                
                <!-- 缓存标记 -->
                <div id="cacheIndicator" class="hidden mb-3">
                    <span class="cache-badge">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                        已从本地缓存加载
                    </span>
                </div>
                
                <!-- 路线信息 -->
                <div class="mb-5 guide-content" style="animation-delay: 0.1s">
                    <h3 class="font-bold mb-3 flex items-center gap-2 text-base">
                        <span>🚗</span> 路线规划
                    </h3>
                    <div id="routeInfo" class="p-3 bg-gray-50 rounded-xl"></div>
                </div>
                
                <!-- 必游景点 -->
                <div class="mb-5 guide-content" style="animation-delay: 0.2s">
                    <h3 class="font-bold mb-3 flex items-center gap-2 text-base">
                        <span>📍</span> 必游景点
                    </h3>
                    <div id="modalSpots" class="bg-gray-50 rounded-xl p-3"></div>
                </div>
                
                <!-- 美食推荐 -->
                <div class="mb-5 guide-content" style="animation-delay: 0.3s">
                    <h3 class="font-bold mb-3 flex items-center gap-2 text-base">
                        <span>🍜</span> 必吃美食
                    </h3>
                    <div id="modalFood" class="bg-gray-50 rounded-xl p-3"></div>
                </div>
                
                <!-- 推荐活动 -->
                <div class="mb-5 guide-content" style="animation-delay: 0.4s">
                    <h3 class="font-bold mb-3 flex items-center gap-2 text-base">
                        <span>🎯</span> 推荐玩法
                    </h3>
                    <div id="modalActivities"></div>
                </div>
                
                <!-- 旅行贴士 -->
                <div class="mb-4 guide-content" style="animation-delay: 0.5s">

                        <span>💡</span> 旅行贴士
                    </h3>
                    <div id="modalTips"></div>
                </div>
            </div>
        </div>
    </div>

        // 季节天气模式
        function getSeasonalWeather(city, date) {
            const month = date.getMonth() + 1; // 1-12
            const day = date.getDate();
            
            // 确定城市气候类型
            let climate = 'north';
            for (const [type, cities] of Object.entries(climateTypes)) {
                if (cities.includes(city)) {
                    climate = type;
                    break;
                }
            }
            
            // 基于城市名和日期的伪随机种子
            const cityHash = city.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
            const dateSeed = date.getFullYear() * 10000 + month * 100 + day;
            const seed = (cityHash + dateSeed) % 1000;
            
            // 根据季节和气候类型确定基础天气概率
            let sunnyProb, cloudyProb, rainyProb;
            
            switch (climate) {
                case 'north':
                    if (month >= 3 && month <= 5) { // 春季
                        sunnyProb = 0.55; cloudyProb = 0.25; rainyProb = 0.20;
                    } else if (month >= 6 && month <= 8) { // 夏季
                        sunnyProb = 0.50; cloudyProb = 0.30; rainyProb = 0.20;
                    } else if (month >= 9 && month <= 11) { // 秋季
                        sunnyProb = 0.70; cloudyProb = 0.20; rainyProb = 0.10;
                    } else { // 冬季
                        sunnyProb = 0.60; cloudyProb = 0.25; rainyProb = 0.05;
                    }
                    break;
                case 'south':
                    if (month >= 3 && month <= 5) { // 春季
                        sunnyProb = 0.35; cloudyProb = 0.35; rainyProb = 0.30;
                    } else if (month >= 6 && month <= 8) { // 夏季（梅雨/台风）
                        sunnyProb = 0.30; cloudyProb = 0.30; rainyProb = 0.40;
                    } else if (month >= 9 && month <= 11) { // 秋季
                        sunnyProb = 0.55; cloudyProb = 0.30; rainyProb = 0.15;
                    } else { // 冬季
                        sunnyProb = 0.40; cloudyProb = 0.40; rainyProb = 0.20;
                    }
                    break;
                case 'southwest':
                    if (month >= 3 && month <= 5) { // 春季
                        sunnyProb = 0.40; cloudyProb = 0.35; rainyProb = 0.25;
                    } else if (month >= 6 && month <= 8) { // 夏季
                        sunnyProb = 0.35; cloudyProb = 0.30; rainyProb = 0.35;
                    } else if (month >= 9 && month <= 11) { // 秋季
                        sunnyProb = 0.50; cloudyProb = 0.35; rainyProb = 0.15;
                    } else { // 冬季
                        sunnyProb = 0.70; cloudyProb = 0.20; rainyProb = 0.10;
                    }
                    break;
                case 'plateau':
                    // 高原地区全年多晴天
                    sunnyProb = 0.75; cloudyProb = 0.20; rainyProb = 0.05;
                    break;
                case 'island':
                    if (month >= 5 && month <= 9) { // 夏季台风季
                        sunnyProb = 0.45; cloudyProb = 0.30; rainyProb = 0.25;
                    } else { // 其他季节多晴天
                        sunnyProb = 0.65; cloudyProb = 0.25; rainyProb = 0.10;
                    }
                    break;
                default:
                    sunnyProb = 0.50; cloudyProb = 0.30; rainyProb = 0.20;
            }
            
            // 使用种子微调概率
            const randomFactor = (seed % 100) / 100;
            const adjustedSeed = (seed * 0.618) % 100 / 100;
            
            // 确定天气类型
            let weatherType;
            if (adjustedSeed < sunnyProb) {
                weatherType = 'sunny';
            } else if (adjustedSeed < sunnyProb + cloudyProb) {
                weatherType = 'cloudy';
            } else if (adjustedSeed < sunnyProb + cloudyProb + rainyProb * 0.6) {
                weatherType = 'overcast';
            } else {
                weatherType = 'rain';
            }
            
            // 根据季节和天气类型计算温度
            let baseTemp;
            switch (climate) {
                case 'north':
                    if (month >= 6 && month <= 8) baseTemp = 28;
                    else if (month >= 12 || month <= 2) baseTemp = -2;
                    else if (month >= 3 && month <= 5) baseTemp = 15;
                    else baseTemp = 18;
                    break;
                case 'south':
                    if (month >= 6 && month <= 8) baseTemp = 32;
                    else if (month >= 12 || month <= 2) baseTemp = 8;
                    else if (month >= 3 && month <= 5) baseTemp = 18;
                    else baseTemp = 22;
                    break;
                case 'southwest':
                    if (month >= 6 && month <= 8) baseTemp = 26;
                    else if (month >= 12 || month <= 2) baseTemp = 12;
                    else baseTemp = 20;
                    break;
                case 'plateau':
                    baseTemp = 15; // 高原温度较低
                    break;
                case 'island':
                    if (month >= 6 && month <= 8) baseTemp = 30;
                    else if (month >= 12 || month <= 2) baseTemp = 15;
                    else baseTemp = 24;
                    break;
                default:
                    baseTemp = 20;
            }
            
            // 天气对温度的影响
            let tempAdjustment = 0;
            switch (weatherType) {
                case 'sunny': tempAdjustment = 2; break;
                case 'cloudy': tempAdjustment = 0; break;
                case 'overcast': tempAdjustment = -2; break;
                case 'rain': tempAdjustment = -4; break;
            }
            
            // 添加随机温度波动
            const tempVariation = ((seed % 7) - 3); // -3 到 +3
            const temperature = Math.round(baseTemp + tempAdjustment + tempVariation);
            
            // 天气图标和描述
            const weatherConfig = {
                sunny: { icon: '☀️', name: '晴', desc: '阳光明媚，适合出行' },
                cloudy: { icon: '⛅', name: '多云', icon2: '🌤️', name2: '晴间多云', desc: '云量适中，天气舒适' },
                overcast: { icon: '☁️', name: '阴', desc: '天空阴沉，偶有微风' },
                rain: { icon: '🌧️', name: '小雨', icon2: '⛈️', name2: '雷阵雨', desc: '有降雨，记得带伞' }
            };
            
            const config = weatherConfig[weatherType];
            // 多云天气有时显示为晴间多云
            const finalIcon = (weatherType === 'cloudy' && seed % 2 === 0) ? config.icon2 : config.icon;
            const finalName = (weatherType === 'cloudy' && seed % 2 === 0) ? config.name2 : config.name;
            const finalName2 = (weatherType === 'rain' && seed % 3 === 0) ? '中雨' : 
                              (weatherType === 'rain' && seed % 5 === 0) ? '阵雨' : finalName;
            
            return {
                type: weatherType,
                icon: finalIcon,
                name: finalName2,
                temp: temperature,
                desc: config.desc,
                humidity: 40 + (seed % 40), // 湿度 40-80%
                windLevel: 1 + (seed % 4), // 风力 1-4级
                aqi: 30 + (seed % 70), // AQI 30-100
                isGoodWeather: weatherType === 'sunny' || weatherType === 'cloudy'
            };
        }

        // 获取缓存的攻略
        function getCachedGuide(cityName, date) {
            try {
                const cached = localStorage.getItem(STORAGE_KEY);
                if (!cached) return null;
                
                const guides = JSON.parse(cached);
                const dateKey = date.toISOString().split('T')[0];
                const cacheKey = `${cityName}_${dateKey}`;
                
                return guides[cacheKey] || null;
            } catch (e) {
                console.error('读取缓存失败:', e);
                return null;
            }
        }
        
        // 保存攻略到缓存
        function saveGuideToCache(cityName, date, guide) {
            try {
                const cached = localStorage.getItem(STORAGE_KEY);
                const guides = cached ? JSON.parse(cached) : {};
                const dateKey = date.toISOString().split('T')[0];
                const cacheKey = `${cityName}_${dateKey}`;
                
                guides[cacheKey] = {
                    ...guide,
                    cachedAt: new Date().toISOString()
                };
                
                // 限制缓存数量，保留最近50个
                const keys = Object.keys(guides);
                if (keys.length > 50) {
                    const oldestKeys = keys
                        .sort((a, b) => new Date(guides[a].cachedAt) - new Date(guides[b].cachedAt))
                        .slice(0, keys.length - 50);
                    oldestKeys.forEach(key => delete guides[key]);
                }
                
                localStorage.setItem(STORAGE_KEY, JSON.stringify(guides));
            } catch (e) {
                console.error('保存缓存失败:', e);
            }
        }

        // 生成路线规划
        function generateRoute(startCity, destCity, features) {
            const distance = calculateDistance(
                citiesDB.find(c => c.name === startCity)?.lat || 39.9,
                citiesDB.find(c => c.name === startCity)?.lon || 116.4,
                citiesDB.find(c => c.name === destCity)?.lat || 39.9,
                citiesDB.find(c => c.name === destCity)?.lon || 116.4
            );
            
            const driveTime = Math.ceil(distance / 80);
            const highSpeedTime = Math.ceil(distance / 250);
            
            let transportAdvice;
            if (distance < 100) {
                transportAdvice = "距离较近，建议自驾或乘坐大巴，约1-2小时可达";
            } else if (distance < 300) {
                transportAdvice = "高铁最为便捷，约1-2小时；自驾约3-4小时";
            } else if (distance < 800) {
                transportAdvice = "建议乘坐高铁，约3-4小时；飞机约1.5小时";
            } else {
                transportAdvice = "距离较远，建议飞机出行，约2-3小时";
            }
            
            return {
                distance: distance.toFixed(1),
                driveTime: driveTime,
                highSpeedTime: highSpeedTime,
                advice: transportAdvice
            };
        }
        
        // 生成预算参考
        function generateBudget(cityName, features) {
            const budgetLevels = {
                metropolis: { min: 600, max: 1200 },
                coastal: { min: 500, max: 1000 },
                resort: { min: 800, max: 1500 },
                plateau: { min: 400, max: 800 },
                general: { min: 300, max: 600 }
            };
            
            let level = features.isMetropolis ? 'metropolis' :
                       features.isCoastal ? 'coastal' :
                       features.isResort ? 'resort' :
                       features.isPlateau ? 'plateau' : 'general';
            
            const budget = budgetLevels[level];
            return `人均 ${budget.min}-${budget.max} 元/天`;
        }

        // ==================== 工具函数 ====================
        let currentStartCity = null;
        let currentSunnyCities = [];
        let currentSelectedDate = new Date();

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // ==================== 搜索功能 ====================
        async function searchSunnyCities() {
            const cityName = document.getElementById('cityInput').value.trim();
            const radius = parseInt(document.getElementById('radiusInput').value);
            
            if (!cityName) {
                alert('请输入城市名称');
                return;
            }
            
            document.getElementById('initialState').classList.add('hidden');
            document.getElementById('results').classList.add('hidden');
            document.getElementById('noResults').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            
            const btn = document.getElementById('searchBtn');
            const btnText = document.getElementById('btnText');
            btn.disabled = true;
            btnText.innerHTML = '<span class="loading mr-2"></span>搜索中...';
            
            await new Promise(r => setTimeout(r, 1500));
            
            const startCity = citiesDB.find(c => c.name.includes(cityName) || cityName.includes(c.name));
            
            if (!startCity) {
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('initialState').classList.remove('hidden');
                alert('未找到该城市，请尝试输入完整城市名');
                btn.disabled = false;
                btnText.textContent = '开始寻找晴天';
                return;
            }
            
            currentStartCity = startCity;
            currentSelectedDate = new Date(document.getElementById('dateInput').value || Date.now());
            const sunnyCities = [];
            
            for (const city of citiesDB) {
                if (city.name === startCity.name) continue;
                
                const distance = calculateDistance(startCity.lat, startCity.lon, city.lat, city.lon);
                if (distance <= radius) {
                    const weather = getSeasonalWeather(city.name, currentSelectedDate);
                    if (weather.isGoodWeather) {
                        sunnyCities.push({ ...city, distance, weather });
                    }
                }
            }
            
            sunnyCities.sort((a, b) => a.distance - b.distance);
            currentSunnyCities = sunnyCities;
            
            document.getElementById('loadingState').classList.add('hidden');
            
            if (sunnyCities.length === 0) {
                document.getElementById('noResults').classList.remove('hidden');
            } else {
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('resultCount').textContent = sunnyCities.length;
                document.getElementById('searchRange').textContent = radius + 'km';
                
                renderCityList(sunnyCities);
                
                if (sunnyCities.length === 1) {
                    setTimeout(() => showCityDetail(sunnyCities[0], true), 500);
                }
            }
            
            btn.disabled = false;
            btnText.textContent = '开始寻找晴天';
        }

        function renderCityList(cities) {
            const container = document.getElementById('cityList');
            container.innerHTML = '';
            
            cities.forEach((city, index) => {
                // 检查是否有缓存
                const cached = getCachedGuide(city.name, currentSelectedDate);
                const hasCache = !!cached;
                
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl p-4 mb-3 card-shadow city-card';
                card.onclick = function() { showCityDetail(city); };
                
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="text-3xl flex-shrink-0">${city.weather.icon}</div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="bg-orange-500 text-white text-xs px-1.5 py-0.5 rounded font-bold">${index + 1}</span>
                                <h3 class="text-lg font-bold truncate">${city.name}</h3>
                                ${hasCache ? '<span class="cache-badge">已缓存</span>' : ''}
                                <span class="text-gray-400 text-sm ml-auto flex-shrink-0">${city.distance.toFixed(1)}km</span>
                            </div>
                            <p class="text-gray-600 text-sm mb-2">${city.weather.name} · ${city.weather.temp}°C · 湿度${city.weather.humidity}%</p>
                            <div class="flex flex-wrap gap-1">
                                <span class="city-tag">AQI ${city.weather.aqi}</span>
                                <span class="city-tag">${city.weather.windLevel}级风</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ==================== 详情弹窗 ====================
        async function showCityDetail(city, isSingle = false) {
            // 显示弹窗
            document.getElementById('modalCityName').textContent = city.name;
            document.getElementById('modalWeather').textContent = `${city.weather.icon} ${city.weather.name} · ${city.weather.temp}°C · 距${currentStartCity.name} ${city.distance.toFixed(1)}km`;
            document.getElementById('detailModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // 显示AI加载状态，隐藏内容
            document.getElementById('aiLoadingState').classList.remove('hidden');
            document.getElementById('guideContent').classList.add('hidden');
            document.getElementById('singleCityContent').classList.toggle('hidden', !isSingle);
            document.getElementById('cacheIndicator').classList.add('hidden');
            
            try {
                // 检查缓存
                let guide = getCachedGuide(city.name, currentSelectedDate);
                let fromCache = false;
                
                if (guide) {
                    fromCache = true;
                    // 模拟从缓存加载的短暂延迟，提升用户体验
                    await new Promise(r => setTimeout(r, 300));
                } else {
                    // 调用AI生成攻略
                    guide = await generateAIGuide(city.name, city.weather, currentStartCity.name);
                    // 保存到缓存
                    saveGuideToCache(city.name, currentSelectedDate, guide);
                }
                
                // 渲染攻略内容
                renderGuideContent(guide, city, fromCache);
                
            } catch (error) {
                console.error('生成攻略失败:', error);
                // 使用默认攻略作为后备
                const defaultGuide = getDefaultGuide(city.name);
                renderGuideContent(defaultGuide, city, false);
            }
        }

        function renderGuideContent(guide, city, fromCache) {
            // 隐藏加载状态，显示内容
            document.getElementById('aiLoadingState').classList.add('hidden');
            document.getElementById('guideContent').classList.remove('hidden');
            
            // 显示缓存标记
            if (fromCache) {
                document.getElementById('cacheIndicator').classList.remove('hidden');
            }
            
            // 路线信息
            const route = guide.route || generateRoute(currentStartCity.name, city.name, analyzeCityFeatures(city.name));
            document.getElementById('routeInfo').innerHTML = `
                <div class="flex items-center justify-between text-sm">
                    <div class="text-center flex-1">
                        <p class="text-gray-500">出发</p>
                        <p class="font-bold text-base">${currentStartCity.name}</p>
                    </div>
                    <div class="px-4 text-center">
                        <p class="text-orange-500 font-bold text-lg">${route.distance}km</p>
                        <p class="text-gray-400 text-xs">约${route.driveTime}小时车程</p>
                    </div>
                    <div class="text-center flex-1">
                        <p class="text-gray-500">到达</p>
                        <p class="font-bold text-base">${city.name}</p>
                    </div>
                </div>
                <div class="mt-3 pt-3 border-t border-gray-200">
                    <p class="text-xs text-gray-500">🚄 交通建议：${route.advice}</p>
                </div>
            `;
            
            // 景点
            const spots = guide.spots || [];
            document.getElementById('modalSpots').innerHTML = spots.map(s => `
                <div class="spot-item">
                    <span class="text-xl mr-3">${s.icon}</span>
                    <div class="flex-1">
                        <p class="font-medium text-sm">${s.name}</p>
                        <p class="text-xs text-gray-500">${s.desc}</p>
                    </div>
                </div>
            `).join('');
            
            // 美食
            const food = guide.food || [];
            document.getElementById('modalFood').innerHTML = food.map(f => `
                <div class="food-item">
                    <span class="text-xl mr-3">${f.icon}</span>
                    <div class="flex-1">
                        <p class="font-medium text-sm">${f.name}</p>
                        <p class="text-xs text-gray-500">${f.desc}</p>
                    </div>
                </div>
            `).join('');
            
            // 活动
            const activities = guide.activities || [];
            document.getElementById('modalActivities').innerHTML = activities.map(a => `
                <div class="bg-gray-50 rounded-xl p-3 mb-2">
                    <div class="flex items-start gap-3">
                        <span class="text-2xl">${a.icon}</span>
                        <div class="flex-1">
                            <div class="flex justify-between items-center mb-1">
                                <p class="font-medium text-sm">${a.name}</p>
                                <span class="text-xs text-gray-400 bg-white px-2 py-0.5 rounded">${a.time}</span>
                            </div>
                            <p class="text-xs text-gray-500">${a.desc}</p>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // 贴士
            const tips = guide.tips || [];
            document.getElementById('modalTips').innerHTML = `
                <ul class="bg-orange-50 rounded-xl p-3 text-sm">
                    ${tips.map(t => `<li class="flex items-start gap-2 mb-1 last:mb-0"><span class="text-orange-500">•</span><span>${t}</span></li>`).join('')}
                </ul>
                <div class="mt-3 p-3 bg-gray-100 rounded-xl text-center">
                    <span class="text-sm text-gray-500">预算参考：</span>
                    <span class="text-orange-500 font-bold">${guide.budget || "人均 300-600 元/天"}</span>
                </div>
                ${guide.generatedBy ? `<p class="text-xs text-gray-400 text-center mt-2">由 ${guide.generatedBy} 生成</p>` : ''}
            `;
        }

        function getDefaultGuide(cityName) {
            return {
                spots: [
                    { name: "市中心广场", icon: "🏛️", desc: "城市地标，感受当地生活气息" },
                    { name: "历史街区", icon: "🏮", desc: "漫步古街，体验传统文化" },
                    { name: "城市公园", icon: "🌳", desc: "休闲放松，欣赏自然风光" },
                    { name: "博物馆", icon: "🏺", desc: "了解城市历史与文化" }
                ],
                food: [
                    { name: "当地特色菜", icon: "🍽️", desc: "品尝正宗本地风味" },
                    { name: "街头小吃", icon: "🍢", desc: "探索路边摊美食" },
                    { name: "老字号餐厅", icon: "🏪", desc: "百年老店，传统味道" },
                    { name: "夜市美食", icon: "🌙", desc: "夜晚的美食聚集地" }
                ],
                activities: [
                    { name: "城市漫步", icon: "🚶", desc: "探索城市街道，发现隐藏美景", time: "半天" },
                    { name: "美食探索", icon: "🍜", desc: "品尝当地特色美食", time: "2小时" },
                    { name: "文化体验", icon: "🎭", desc: "参观博物馆或文化景点", time: "3小时" }
                ],
                tips: ["提前规划行程路线", "关注当地天气预报", "尊重当地风俗习惯"],
                budget: "人均 300-600 元/天"
            };
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function closeModalOnBackdrop(event) {
            if (event.target === document.getElementById('detailModal')) {
                closeModal();
            }
        }

        // 初始化日期为今天
        document.getElementById('dateInput').valueAsDate = new Date();
    </script>
</body>
</html>
