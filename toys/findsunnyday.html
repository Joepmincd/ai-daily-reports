<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>找晴天 - 发现附近的晴天城市</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans SC', sans-serif; touch-action: manipulation; }
        .gradient-bg { background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%); }
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .city-tag { display: inline-block; padding: 4px 10px; background: #FFF5E6; color: #FF8E53; border-radius: 16px; font-size: 11px; margin: 2px; font-weight: 500; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #FF8E53; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 20px 20px 0 0; width: 100%; max-height: 85vh; overflow-y: auto; padding: 20px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .city-card { cursor: pointer; transition: all 0.2s; }
        .city-card:active { transform: scale(0.98); background-color: #FFF5E6; }
        .food-item, .spot-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
        .food-item:last-child, .spot-item:last-child { border-bottom: none; }
        
        /* 移动端优化 */
        @media (max-width: 640px) {
            .header-title { font-size: 1.75rem; }
            .header-subtitle { font-size: 0.875rem; }
            .search-panel { position: static; margin-bottom: 16px; }
            .city-card { padding: 14px; }
            .modal-content { padding: 16px; border-radius: 16px 16px 0 0; }
            .section-title { font-size: 1rem; }
        }
        
        /* 滑动条样式 */
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; background: #e5e7eb; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #FF8E53; cursor: pointer; }
        input[type="range"]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: #FF8E53; cursor: pointer; border: none; }
        
        /* 日期选择器样式 */
        input[type="date"] { -webkit-appearance: none; }
    </style>
</head>

    <main class="container mx-auto px-3 sm:px-4 py-4 sm:py-8">

                    <h2 class="text-lg sm:text-xl font-bold mb-4 sm:mb-6 flex items-center gap-2">
                        <span>🔍</span> 搜索设置
                    </h2>
                    
                    <div class="mb-4 sm:mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">出发城市</label>
                        <input type="text" id="cityInput" placeholder="输入城市名称，如：北京"
                            class="w-full px-4 py-3 text-base border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400"
                            value="北京">
                        <p class="text-xs text-gray-400 mt-1">支持全国 300+ 城市</p>
                    </div>
                    
                    <div class="mb-4 sm:mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">出行日期</label>
                        <input type="date" id="dateInput"
                            class="w-full px-4 py-3 text-base border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400">
                    </div>
                    
                    <div class="mb-4 sm:mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">搜索范围</label>
                        <input type="range" id="radiusInput" min="50" max="500" value="200"
                            oninput="document.getElementById('radiusValue').textContent = this.value + ' km'">
                        <div class="flex justify-between text-xs sm:text-sm text-gray-500 mt-2">
                            <span>50km</span>
                            <span id="radiusValue" class="font-medium text-orange-500">200 km</span>
                            <span>500km</span>
                        </div>
                    </div>
                    
                    <button onclick="searchSunnyCities()" id="searchBtn"
                        class="w-full gradient-bg text-white font-bold py-3.5 sm:py-4 rounded-xl hover:opacity-90 transition-opacity flex items-center justify-center gap-2 text-base">
                        <span id="btnText">开始寻找晴天</span>
                    </button>
                </div>
            </div>
            
            <!-- 结果区域 -->
            <div class="lg:w-2/3">
                <div id="initialState" class="text-center py-12 sm:py-20">
                    <div class="text-6xl sm:text-8xl mb-4 opacity-30">🌤️</div>
                    <h3 class="text-lg sm:text-xl font-medium text-gray-400">输入城市开始搜索</h3>
                </div>
                
                <div id="loadingState" class="hidden text-center py-12 sm:py-20">
                    <div class="loading mb-4"></div>
                    <p class="text-gray-500 text-sm sm:text-base">正在搜索附近的晴天城市...</p>
                </div>
                
                <div id="noResults" class="hidden text-center py-12 sm:py-20">
                    <div class="text-6xl sm:text-8xl mb-4">🌧️</div>
                    <h3 class="text-lg sm:text-xl font-medium text-gray-600">附近没有找到晴天城市</h3>
                    <p class="text-gray-400 mt-2 text-sm">试试扩大搜索范围或换个日期</p>
                </div>
                
                <div id="results" class="hidden">
                    <div class="bg-gradient-to-r from-orange-400 to-red-400 rounded-2xl p-4 sm:p-6 text-white mb-4 sm:mb-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-white/80 text-xs sm:text-sm">找到晴天城市</p>
                                <p class="text-2xl sm:text-3xl font-bold" id="resultCount">0</p>
                            </div>
                            <div class="text-right">
                                <p class="text-white/80 text-xs sm:text-sm">搜索范围</p>
                                <p class="text-lg sm:text-xl font-bold" id="searchRange">200km</p>
                            </div>
                        </div>
                        <p class="text-white/80 text-xs sm:text-sm mt-2">💡 点击城市卡片查看详细路线和攻略</p>
                    </div>
                    
                    <div id="cityList"></div>
                </div>
            </div>
        </div>
    </main>

    </div>

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // 获取天气数据（使用和风天气API）
        async function getWeather(city, date) {
            const cityData = citiesDB.find(c => c.name === city);
            if (!cityData) {
                // 如果找不到城市，返回模拟数据
                return getMockWeather(city, date);
            }
            
            try {
                // 计算日期偏移（0=今天，1=明天，2=后天）
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const targetDate = new Date(date);
                targetDate.setHours(0, 0, 0, 0);
                const dayDiff = Math.round((targetDate - today) / (1000 * 60 * 60 * 24));
                
                // 和风天气只支持7天预报
                if (dayDiff < 0 || dayDiff > 6) {
                    return getMockWeather(city, date);
                }
                
                // 调用和风天气API - 使用正确的API地址
                const url = `https://api.qweather.com/v7/weather/${dayDiff === 0 ? 'now' : '3d'}?location=${cityData.lon},${cityData.lat}&key=${QWEATHER_KEY}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.code === '200') {
                    let weatherCode, temp;
                    
                    if (dayDiff === 0 && data.now) {
                        // 实时天气
                        weatherCode = data.now.icon;
                        temp = parseInt(data.now.temp);
                    } else if (data.daily && data.daily[dayDiff]) {
                        // 预报天气
                        weatherCode = data.daily[dayDiff].iconDay;
                        temp = parseInt(data.daily[dayDiff].tempMax);
                    } else {
                        return getMockWeather(city, date);
                    }
                    
                    const weatherInfo = weatherCodeMap[weatherCode] || { type: 'unknown', name: '未知', icon: '❓' };
                    
                    return {
                        type: weatherInfo.type,
                        name: weatherInfo.name,
                        icon: weatherInfo.icon,
                        temp: temp
                    };
                } else {
                    console.warn('和风天气API返回错误:', data.code);
                    return getMockWeather(city, date);
                }
            } catch (error) {
                console.error('获取天气失败:', error);
                return getMockWeather(city, date);
            }
        }
        
        // 模拟天气数据（备用）
        function getMockWeather(city, date) {
            const conditions = [
                { type: 'sunny', name: '晴', icon: '☀️', temp: 25 },
                { type: 'cloudy', name: '多云', icon: '⛅', temp: 22 },
                { type: 'overcast', name: '阴', icon: '☁️', temp: 20 },
                { type: 'rain', name: '小雨', icon: '🌧️', temp: 18 }
            ];
            
            const dayOfYear = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
            const cityHash = city.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
            const seed = (dayOfYear + cityHash) % 100;
            const isGoodWeather = seed < 70;
            const conditionIndex = isGoodWeather ? (seed % 2) : (2 + (seed % 2));
            
            return conditions[conditionIndex];
        }

        async function searchSunnyCities() {
            const cityName = document.getElementById('cityInput').value.trim();
            const radius = parseInt(document.getElementById('radiusInput').value);
            
            if (!cityName) {
                alert('请输入城市名称');
                return;
            }
            
            document.getElementById('initialState').classList.add('hidden');
            document.getElementById('results').classList.add('hidden');
            document.getElementById('noResults').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            
            const btn = document.getElementById('searchBtn');
            const btnText = document.getElementById('btnText');
            btn.disabled = true;
            btnText.innerHTML = '<span class="loading mr-2"></span>搜索中...';
            
            await new Promise(r => setTimeout(r, 1500));
            
            const startCity = citiesDB.find(c => c.name.includes(cityName) || cityName.includes(c.name));
            
            if (!startCity) {
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('initialState').classList.remove('hidden');
                alert('未找到该城市，请尝试输入完整城市名');
                btn.disabled = false;
                btnText.textContent = '开始寻找晴天';
                return;
            }
            
            currentStartCity = startCity;
            const selectedDate = new Date(document.getElementById('dateInput').value || Date.now());
            const sunnyCities = [];
            
            // 并行获取所有城市的天气
            const weatherPromises = [];
            for (const city of citiesDB) {
                if (city.name === startCity.name) continue;
                
                const distance = calculateDistance(startCity.lat, startCity.lon, city.lat, city.lon);
                if (distance <= radius) {
                    weatherPromises.push(
                        getWeather(city.name, selectedDate).then(weather => {
                            if (weather.type === 'sunny' || weather.type === 'cloudy') {
                                sunnyCities.push({ ...city, distance, weather });
                            }
                        })
                    );
                }
            }
            
            // 等待所有天气请求完成
            await Promise.all(weatherPromises);
            
            sunnyCities.sort((a, b) => a.distance - b.distance);
            currentSunnyCities = sunnyCities;
            
            document.getElementById('loadingState').classList.add('hidden');
            
            if (sunnyCities.length === 0) {
                document.getElementById('noResults').classList.remove('hidden');
            } else {
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('resultCount').textContent = sunnyCities.length;
                document.getElementById('searchRange').textContent = radius + 'km';
                
                renderCityList(sunnyCities);
                
                if (sunnyCities.length === 1) {
                    setTimeout(() => showCityDetail(sunnyCities[0], true), 500);
                }
            }
            
            btn.disabled = false;
            btnText.textContent = '开始寻找晴天';
        }

            document.getElementById('detailModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function closeModalOnBackdrop(event) {
            if (event.target === document.getElementById('detailModal')) {
                closeModal();
            }
        }

        // 初始化日期为今天
        document.getElementById('dateInput').valueAsDate = new Date();
            document.getElementById('modalSpots').innerHTML = spots.map(s => `
                <div class="spot-item">
                    <span class="text-xl mr-3">${s.icon}</span>
                    <div class="flex-1">
                        <p class="font-medium text-sm">${s.name}</p>
                        <p class="text-xs text-gray-500">${s.desc}</p>
                    </div>
                </div>
            `).join('');
            
            // 美食
            const food = guide.food || [];
            document.getElementById('modalFood').innerHTML = food.map(f => `
                <div class="food-item">
                    <span class="text-xl mr-3">${f.icon}</span>
                    <div class="flex-1">
                        <p class="font-medium text-sm">${f.name}</p>
                        <p class="text-xs text-gray-500">${f.desc}</p>
                    </div>
                </div>
            `).join('');
            
            // 活动
            const activities = guide.activities || [];
            document.getElementById('modalActivities').innerHTML = activities.map(a => `
                <div class="bg-gray-50 rounded-xl p-3 mb-2">
                    <div class="flex items-start gap-3">
                        <span class="text-2xl">${a.icon}</span>
                        <div class="flex-1">
                            <div class="flex justify-between items-center mb-1">
                                <p class="font-medium text-sm">${a.name}</p>
                                <span class="text-xs text-gray-400 bg-white px-2 py-0.5 rounded">${a.time}</span>
                            </div>
                            <p class="text-xs text-gray-500">${a.desc}</p>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // 贴士
            const tips = guide.tips || [];
            document.getElementById('modalTips').innerHTML = `
                <ul class="bg-orange-50 rounded-xl p-3 text-sm">
                    ${tips.map(t => `<li class="flex items-start gap-2 mb-1 last:mb-0"><span class="text-orange-500">•</span><span>${t}</span></li>`).join('')}

                <div class="mt-3 p-3 bg-gray-100 rounded-xl text-center">
                    <span class="text-sm text-gray-500">预算参考：</span>

            `;
            
            document.getElementById('detailModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function closeModalOnBackdrop(event) {
            if (event.target === document.getElementById('detailModal')) {
                closeModal();
            }
        }

        // 初始化日期为今天
        document.getElementById('dateInput').valueAsDate = new Date();
    </script>
